<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaFire Direct Link API</title>
  <style>
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#330b0b,#070707 55%);color:#fff;display:flex;align-items:center;justify-content:center;padding:18px}
    .card{width:100%;max-width:560px;background:rgba(18,18,18,.94);border:1px solid rgba(255,60,60,.25);border-radius:22px;padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.45)}
    .badge{display:inline-block;padding:6px 12px;border-radius:999px;background:rgba(255,40,40,.12);color:#ff7777;font-size:12px;margin-bottom:12px}
    h1{margin:0 0 8px;font-size:25px}
    p{margin:0 0 18px;color:#bbb;line-height:1.5;font-size:14px}
    label{font-size:13px;color:#ddd;display:block;margin-bottom:8px}
    input{width:100%;padding:14px;border:1px solid #333;border-radius:14px;background:#101010;color:#fff;outline:none;font-size:14px;margin-bottom:12px}
    input:focus{border-color:#ff3b3b}
    button{width:100%;border:0;border-radius:14px;padding:14px;color:white;background:linear-gradient(135deg,#e50914,#8b0000);cursor:pointer;font-weight:bold;font-size:15px;margin-top:6px}
    button:disabled{opacity:.55;cursor:not-allowed}
    .result{margin-top:16px;padding:14px;border-radius:14px;background:#0d0d0d;border:1px solid #252525;display:none;word-break:break-all}
    .result small{color:#999;display:block;margin-bottom:8px}
    .link{color:#7dd3fc;font-size:14px;line-height:1.5}
    .row{display:flex;gap:10px;margin-top:12px}
    .row button{margin:0;font-size:13px;padding:12px}
    .secondary{background:#1f1f1f;border:1px solid #333}
    .status{margin-top:12px;font-size:13px;color:#aaa;min-height:18px}
    .api{background:#090909;border:1px solid #252525;border-radius:14px;padding:12px;color:#ddd;font-size:13px;word-break:break-all;margin-bottom:16px}
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">No API Key Needed</span>
    <h1>MediaFire Direct Link API</h1>
    <p>Paste a MediaFire link. This Vercel API will scrape the page and return the direct download URL.</p>

    <div class="api" id="apiExample">API: /api/mediafire?link=MEDIAFIRE_LINK</div>

    <label for="mediafireLink">MediaFire Link</label>
    <input id="mediafireLink" placeholder="https://www.mediafire.com/file/xxxx/file.zip/view" />

    <button id="generateBtn" onclick="generateDirectLink()">Generate Direct Link</button>

    <div class="status" id="status"></div>

    <div class="result" id="resultBox">
      <small>Direct Download Link:</small>
      <div class="link" id="directLink"></div>
      <div class="row">
        <button onclick="copyDirectLink()">Copy</button>
        <button class="secondary" onclick="openDirectLink()">Open</button>
      </div>
    </div>
  </main>

  <script>
    let lastDirectLink = "";

    async function generateDirectLink() {
      const mediafireLink = document.getElementById("mediafireLink").value.trim();
      const status = document.getElementById("status");
      const resultBox = document.getElementById("resultBox");
      const directLinkEl = document.getElementById("directLink");
      const btn = document.getElementById("generateBtn");

      resultBox.style.display = "none";
      directLinkEl.textContent = "";
      lastDirectLink = "";

      if (!mediafireLink) {
        status.textContent = "Please paste a MediaFire link.";
        return;
      }

      try {
        btn.disabled = true;
        status.textContent = "Generating...";

        const response = await fetch("/api/mediafire?link=" + encodeURIComponent(mediafireLink));
        const json = await response.json();

        if (!response.ok || json.status !== "true") {
          throw new Error(json.message || "Failed to generate direct link.");
        }

        const direct = json?.data?.file?.url?.directDownload;
        if (!direct) throw new Error("Direct link not found in API response.");

        lastDirectLink = direct;
        directLinkEl.textContent = direct;
        resultBox.style.display = "block";
        status.textContent = "Done.";
      } catch (error) {
        status.textContent = "Failed: " + error.message;
      } finally {
        btn.disabled = false;
      }
    }

    async function copyDirectLink() {
      if (!lastDirectLink) return;
      await navigator.clipboard.writeText(lastDirectLink);
      document.getElementById("status").textContent = "Copied.";
    }

    function openDirectLink() {
      if (!lastDirectLink) return;
      window.open(lastDirectLink, "_blank");
    }

    document.getElementById("apiExample").textContent =
      "API: " + location.origin + "/api/mediafire?link=MEDIAFIRE_LINK";
  </script>
</body>
</html>
